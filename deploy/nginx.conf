server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/png image/jpeg;

    location /api/orch/ {
        set $upstream phone-orchestrator:9090;
        if ($af_auth_ok = 0) {
            add_header Content-Type application/json always;
            return 401 '{"error":"unauthorized"}';
        }
        rewrite ^/api/orch/?(.*)$ /$1 break;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /api/prov/ {
        set $upstream phone-provisioner:19092;
        if ($af_auth_ok = 0) {
            add_header Content-Type application/json always;
            return 401 '{"error":"unauthorized"}';
        }
        rewrite ^/api/prov/?(.*)$ /$1 break;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    location /api/behavior/ {
        set $upstream behavior-engine:19096;
        if ($af_auth_ok = 0) {
            add_header Content-Type application/json always;
            return 401 '{"error":"unauthorized"}';
        }
        rewrite ^/api/behavior/?(.*)$ /$1 break;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /api/minio/ {
        set $upstream minio:9000;
        if ($af_auth_ok = 0) {
            add_header Content-Type application/json always;
            return 401 '{"error":"unauthorized"}';
        }
        rewrite ^/api/minio/?(.*)$ /$1 break;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location /api/bulk/ {
        if ($af_auth_ok = 0) {
            add_header Content-Type application/json always;
            return 401 '{"error":"unauthorized"}';
        }
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
